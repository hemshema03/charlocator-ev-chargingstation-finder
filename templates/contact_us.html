<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/contact-us.css">
    <link rel="stylesheet" href="/static/contact us.js">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>Feedback </title>
</head>

<header>
  <a href="{{ url_for('home') }}" class="logo"> <img src="/static/pic/LOGO1.PNG" alt="logo"> </a>
  <nav>
    <ul>
      <li><a href="http://127.0.0.1:5000/user-dashboard">Back</a></li>
     
  </ul>
  </nav>
  
  
</header>


<body>
  <div class="contact_us">
    <h2>Feedback 😊</h2>
    <form id="contact_usform" action="/contact_us" method="POST">
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>

      <label for="message">Feedback:</label>
      <textarea id="message" name="message" required></textarea>

      <input type="submit" value="Send">
    </form>
  </div>

  {% if message %}
    <script>
      alert("{{ message }}");
    </script>
  {% endif %}
</body>




</html>
</html>
