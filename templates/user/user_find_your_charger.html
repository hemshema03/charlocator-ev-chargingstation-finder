<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChargeLocator | Find Charger</title>

    <link rel="stylesheet" href="/static/user/find-your-charger.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>

<body>

<header class="navbar">
    <a href="{{ url_for('home') }}" class="brand">
        <img src="/static/pic/LOGO1.PNG" alt="ChargeLocator Logo">
        <span>ChargeLocator</span>
    </a>

    <nav>
        <a href="/user-dashboard">
            <i class="fa-solid fa-chart-line"></i>
            Dashboard
        </a>
        <a href="/logout" class="logout-btn">
            <i class="fa-solid fa-right-from-bracket"></i>
            Logout
        </a>
    </nav>
</header>

<section class="search-page">
    <div class="glow glow-one"></div>
    <div class="glow glow-two"></div>

    <div class="search-content">
        <p class="badge">
            <i class="fa-solid fa-location-dot"></i>
            Smart Station Search
        </p>

        <h1>
            Find Your EV
            <span>Charging Slot</span>
        </h1>

        <p>
            Select your city and preferred charger type to discover available charging stations
            and reserve your slot instantly.
        </p>
    </div>

    <div class="search-card">
        <div class="card-header">
            <i class="fa-solid fa-charging-station"></i>
            <div>
                <h2>Search Charger</h2>
                <p>Choose location and charging type</p>
            </div>
        </div>

        <form action="{{ url_for('search_stations') }}" method="post">
    <div class="form-group">
        <label for="City">Select City</label>
        <div class="input-box">
            <i class="fa-solid fa-city"></i>
            <select id="City" name="City" required>
                <option value="">Choose your city</option>
                {% for city in cities %}
                    <option value="{{ city.city }}">{{ city.city|title }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div class="form-group">
        <label for="Charger_type">Charging Type</label>
        <div class="input-box">
            <i class="fa-solid fa-bolt"></i>
            <select name="Charger_type" id="Charger_type" required>
                <option value="">Choose charger type</option>
                {% for charger in charger_types %}
                    <option value="{{ charger.charger_type }}">{{ charger.charger_type }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <button id="book" type="submit">
        Search Stations
        <i class="fa-solid fa-arrow-right"></i>
    </button>
</form>
    </div>
</section>

</body>
</html>
