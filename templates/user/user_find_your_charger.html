<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/user/find-your-charger.css" />
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css"/>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.11.4/css/jquery.dataTables.min.css">
    
    <title>find your charger</title>
  </head>

  <!-- HEADER SECTION -->

  <header>
    <a href="{{ url_for('home') }}" class="logo"> <img src="/static/pic/LOGO1.PNG" alt="logo"> </a>
    <nav>
      <ul>
        <li><a href="{{ url_for('home') }}">Home</a></li>
    </ul>
    </nav>
    
    
</header>

  <main>
    <!-- BODY SECTION -->

    <div class="container">
      
      <h1>Find Your Charge Point</h1>
      <form action="{{ url_for('search_stations') }}" method="post">
        <label for="City">Select a City: </label>
        <select id="City" name="City" required>
          <option value="">--Select a City--</option>
          <option value="coimbatore">coimbatore</option>
          <option value="Chennai">Chennai</option>
          <option value="Erode">Erode</option>
          <option value="Thirupur">Thirupur</option>
          <option value="salem">salem</option>
          
        </select>
        <br />
        <br>
        <label for="Ch#36dc33ype">Select Charging Type:</label>
        <select name="Charger_type" id="Charger_type" required>
          <option value="">--Select--</option>
          <option value="AC Level 1 Charging">AC Level 1 Charging</option>
          <option value="AC Level 2 Charging">AC Level 2 Charging</option>
          <option value="DC Fast Charging">DC Fast Charging</option>
        </select>
        <br />
        <button id="book" type="submit"> Search  </button>
      </form>
  </main>

  
</html>
