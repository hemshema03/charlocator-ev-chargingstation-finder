<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.11.4/css/jquery.dataTables.min.css">  
    <link rel="stylesheet" href="/static/admin/Manage-station.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Station</title>

    <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.min.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" crossorigin="anonymous">
</head>

<body>

<div class="d-flex toggled" id="wrapper">

    <!-- Sidebar -->
    <div class="bg-light border-right" id="sidebar-wrapper">
        <div class="text-right">
            <button class="sidebar-toggler" id="sidebar-toggle-onSidebar">
                <span class="icon-bar top-bar"></span>
                <span class="icon-bar middle-bar"></span>
            </button>
        </div>

        <div class="list-group list-group-flush">
            <a href="/admin-home" class="list-group-item list-group-item-action bg-light">Dashboard</a>
            <a href="/Manage_station" class="list-group-item list-group-item-action bg-light">Manage Station</a>
            <a href="/view_booking" class="list-group-item list-group-item-action bg-light">View Booking</a>
            <a href="/view_feedback" class="list-group-item list-group-item-action bg-light">View Feedback</a>
            <a href="/logout" class="list-group-item list-group-item-action bg-light">Logout</a>
        </div>
    </div>
    <div id="sidebar-empty-space" class="empty-space-sidebar"></div>

    <!-- Page Content -->
    <div id="page-content-wrapper">

        <nav class="navbar navbar-light scroll scrolling-navbar py-2"></nav>

        <h2 class="text-center">Manage Station ⛽</h2><br>

        <!-- Form to Add a New Station -->
        <form action="/add_station" method="POST" class="add-station-form">
            <div class="form-group">
                <label>Station Name</label>
                <input type="text" name="station_name" class="form-control" required>
            </div>

            <div class="form-group">
                <label>Address</label>
                <input type="text" name="address" class="form-control" required>
            </div>

            <div class="form-group">
                <label>City</label>
                <input type="text" name="city" class="form-control" required>
            </div>

            <div class="form-group">
                <label>Charger Type</label>
                <input type="text" name="charger_type" class="form-control" required>
            </div>

            <div class="form-group">
                <label>Available Ports</label>
                <input type="number" name="available_ports" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-success">Add Station</button>
        </form>

        <br>

        <!-- Existing Station List Table -->
        <table id="myTable" class="display table table-bordered">
            <thead>
                <tr>
                    <th>SL.NO</th>
                    <th>STATION NAME</th>
                    <th>ADDRESS</th>
                    <th>CITY</th>
                    <th>CHARGE TYPE</th>
                    <th>AVAILABLE PORTS</th>
                    <th>ACTIONS</th>
                </tr>
            </thead>
            <tbody>
                {% for i in data %}
                <tr>
                    <td>{{ loop.index }}</td>
                    <td>{{ i.station_name }}</td>
                    <td>{{ i.address }}</td>
                    <td>{{ i.city }}</td>
                    <td>{{ i.charger_type }}</td>
                    <td>{{ i.available_ports }}</td>
                    <td>
                        <a href="/adm_delete_station/{{ i.station_id }}" class="btn btn-danger">Remove</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.11.4/js/jquery.dataTables.min.js"></script>
<script>
$(document).ready(function() {
    $('#myTable').DataTable({
        "paging": false, // hide pagination
        "searching": false // hide search bar
    });
});
</script>

</body>
</html>
